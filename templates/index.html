<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario 3D Pro</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .animated-bg {
      background: linear-gradient(-45deg, #1e3a8a, #9333ea, #ec4899, #3b82f6);
      background-size: 400% 400%;
      animation: gradientBG 10s ease infinite;
    }
    
    /* Perspectiva para que el efecto 3D de JS se vea mejor */
    body { perspective: 1000px; }
    </style>
</head>

<body class="animated-bg flex items-center justify-center min-h-screen p-4">

<div id="card" class="bg-white p-8 rounded-3xl shadow-2xl transform transition-transform duration-200 w-full max-w-sm">
    
    <h2 class="text-3xl font-extrabold mb-6 text-center text-gray-800">Contacto</h2>

    <form method="POST" class="flex flex-col gap-4">
        <input 
            type="text" 
            name="nombre" 
            placeholder="Nombre completo"
            class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all"
            required
        >

        <input 
            type="email" 
            name="email" 
            placeholder="Correo electrónico (Gmail)"
            class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all"
            required
        >

        <input 
            type="tel" 
            name="telefono" 
            placeholder="Número de teléfono"
            class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all"
            required
        >

        <textarea 
            name="mensaje_user" 
            placeholder="Escribe tu mensaje..."
            rows="3"
            class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all resize-none"
            required
        ></textarea>

        <button class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold p-3 rounded-xl hover:opacity-90 shadow-lg transform active:scale-95 transition-all">
            Enviar a AWS
        </button>
    </form>

    {% if mensaje %}
        <div class="mt-6 p-3 bg-green-50 border border-green-200 rounded-lg">
            <p class="text-green-700 text-sm text-center font-medium">{{ mensaje }}</p>
        </div>
    {% endif %}

</div>

<script src="{{ url_for('static', filename='js/effect.js') }}"></script>

</body>
</html>
